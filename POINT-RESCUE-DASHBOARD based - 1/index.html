<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>POINTRESCUE DASHBOARD</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css" />

</head>

<body>

    <h1>POINTRESCUE DASHBOARD</h1>

    <div class="card">

        <p>
            Latitude :
            <span id="lat">-</span>
        </p>

        <p>
            Longitude :
            <span id="lon">-</span>
        </p>

        <p>
            Altitude :
            <span id="alt">-</span>
        </p>

        <p>
            Speed :
            <span id="speed">-</span>
        </p>

        <p>
            Satellite :
            <span id="sat">-</span>
        </p>

    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="script.js"></script>

</body>

</html>
